apiVersion: v1
kind: Secret
metadata:
  name: mongo-secret
  namespace: todo-app
type: Opaque
stringData:
  MONGO_INITDB_ROOT_USERNAME: admin
  MONGO_INITDB_ROOT_PASSWORD: password123

# Notes:
# - Secret stores sensitive values such as database username and password.
# - stringData lets you write plain text; Kubernetes stores it as base64.
# - For learning this is okay, but in real projects do not commit real secrets.
# - MongoDB official image reads MONGO_INITDB_ROOT_USERNAME and
#   MONGO_INITDB_ROOT_PASSWORD when the database starts for the first time.
